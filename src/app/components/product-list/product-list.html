<h2>Liste des produits</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Nom</th>
    <th>Prix</th>
    <th>Quantité</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let p of products">
    <td>{{p.id}}</td>
    <td>{{p.name}}</td>
    <td>{{p.price}}</td>
    <td>{{p.quantity}}</td>
    <td>
      <button (click)="deleteProduct(p.id)">Supprimer</button>
    </td>
  </tr>
</table>
